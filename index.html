<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Red Cross Society UnIorin chapter</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="fontawesome-free-6.5.1-web/css/all.css" />
    <link rel="icon" href="Images/favicon.ico" />
  </head>
  <body>
    <header>
      <!-- Logo of the site -->
      <nav class="navbar">
        <div class="logo">
          <img src="Images/red-cross-logo.png" alt="red-cross-society logo" />
        </div>
        <!-- Navigation links -->
        <div class="nav-links">
          <ul>
            <li><a href="#home">Home</a></li>
            <li><a href="#about">About Us</a></li>
            <li><a href="#testimonies">Testimonies</a></li>
            <li><a href="#contact">Contact Us</a></li>
          </ul>
        </div>
        <!-- Navigation buttons -->

        <button
          class="menu-toggle"
          aria-label="Toggle menu"
          aria-expanded="false">
          <i class="fas fa-bars"></i>
        </button>
      </nav>
    </header>

    <!-- MAIN PAGE -->
    <main>
      <!-- HOME SECTION -->
      <section id="home">
        <div class="home-page">
          <h1>"Be the Help Someone Needs <span>Today.</span>"</h1>
          <p>
            Join the Red Cross Society at University of Ilorin and make a real
            difference.
          </p>
          <button>Donate<i class="fa-solid fa-hand-holding-dollar"></i></button>
        </div>
      </section>
    </main>
    <script src="function.js"></script>
  </body>
</html>
